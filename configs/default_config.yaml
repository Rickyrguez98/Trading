# Asset Selection — default configuration
# All weights, thresholds, and provider choices live here so the pipeline
# stays declarative and reproducible.

run:
  # Mode controls how the universe is built:
  #   full   -> use the entire cleaned U.S. universe; reduce via the staged
  #             funnel below (pipeline.*_top_k). No silent alphabetical cap.
  #   sample -> honour `sample_limit` (or CLI --limit) for a fast test run.
  #   custom -> the universe comes from the CLI's `--tickers` flag.
  mode: full
  # Only used in sample mode. Override on the CLI with `--limit N`.
  sample_limit: null
  # Number of top-ranked tickers written to the Markdown report.
  top_n: 25
  # Where the pipeline writes its CSV/JSON/MD outputs.
  output_dir: reports
  processed_dir: data/processed

# Staged-funnel limits. Set any value to null to skip that stage's cap.
# A full-universe run typically goes 4700 -> 500 -> 150 -> rank.
pipeline:
  # Hard cap on the cleaned stage-1 universe. Null = keep everything.
  universe_max: null
  # Tickers kept after the cheap price/liquidity prescreen.
  after_prices_top_k: 500
  # Tickers kept after the fundamental prescreen. News/sentiment runs only
  # on this set, which is what makes the pipeline compatible with the free
  # yfinance news endpoint at scale.
  after_fundamentals_top_k: 150
  # Drop tickers whose lookback price history is shorter than this.
  min_price_history_days: 30

universe:
  # Primary source -> first fallback -> second fallback.
  sources: [nasdaq_trader, sec_company_tickers]
  # Exchange whitelist. Empty list keeps every exchange present in the
  # source files (NASDAQ + NYSE + NYSE American + NYSE Arca + BATS + IEX).
  # Recognised aliases: AMEX <-> NYSE American; ARCA <-> NYSE Arca; CBOE <-> BATS.
  exchanges: []
  # Asset-type inclusion. Defaults exclude fund-like and non-common-stock
  # instruments. Flip any to true to widen the universe.
  include_etfs: false
  include_funds: false
  include_warrants: false
  include_units: false
  include_preferred: false
  include_rights: false
  include_test_issues: false
  include_notes: false
  # Minimum length of ticker symbol (filters out obvious garbage).
  min_ticker_length: 1
  max_ticker_length: 5

providers:
  fundamentals: yfinance      # yfinance | finnhub (future) | fmp (future)
  prices: yfinance            # yfinance | alphavantage (future)
  news: yfinance              # yfinance | newsapi (future) | marketaux (future)

cache:
  enabled: true
  dir: data/cache
  # Per-provider TTL in seconds. Fundamentals change slowly; news changes fast.
  ttl_seconds:
    fundamentals: 86400       # 24h
    prices: 43200             # 12h
    news: 3600                # 1h
    universe: 604800          # 7d

rate_limits:
  # Minimum seconds between calls per provider, to be polite with free APIs.
  yfinance: 0.4

prices:
  lookback_days: 90
  # Liquidity filter: minimum 20-day average dollar volume.
  min_avg_dollar_volume: 1000000
  # Minimum market cap in USD (penny-stock filter).
  min_market_cap: 100000000
  # Momentum / trend handling within the risk model.
  # If return_pct over the lookback is below this threshold, the ticker is
  # marked with WEAK_PRICE_TREND and given a fixed price-trend penalty.
  weak_return_threshold: -0.10
  # Strength of the cross-sectional momentum penalty (0..100 contribution).
  momentum_penalty_strength: 20.0

sentiment:
  model: vader                # vader | finbert (optional, requires extras)
  # Articles older than this are ignored.
  max_age_days: 30
  # Exponential half-life (in days) for recency weighting.
  recency_halflife_days: 7
  # Minimum number of articles before sentiment is considered confident.
  min_articles_for_confidence: 3
  # Confidence below this fires the LOW_SENTIMENT_CONFIDENCE flag (0..1).
  low_confidence_threshold: 0.3

scoring:
  # Winsorize each metric at these percentiles before z-scoring.
  winsor_lower_pct: 0.02
  winsor_upper_pct: 0.98
  # Missing-data penalty as a fraction of the pillar score (per missing field).
  missing_penalty_per_field: 0.05

  # Per-pillar metric weights. Within a pillar, weights are renormalized over
  # whichever metrics are non-missing for the given ticker.
  growth:
    revenue_growth: 0.35
    earnings_growth: 0.35
    fcf_growth: 0.30
  quality:
    roe: 0.30
    roa: 0.20
    operating_margin: 0.25
    net_margin: 0.25
  valuation:
    # Lower is better for these; the scorer inverts internally.
    pe_ratio: 0.30
    forward_pe: 0.25
    peg_ratio: 0.20
    price_to_sales: 0.15
    price_to_book: 0.10
  balance_sheet:
    debt_to_equity: 0.60      # inverted (less is better)
    current_ratio: 0.40
  cash_flow:
    free_cash_flow_yield: 0.60
    operating_cash_flow_margin: 0.40

  # Pillar weights inside the fundamentals_score aggregator.
  pillars:
    growth: 0.25
    quality: 0.25
    valuation: 0.20
    balance_sheet: 0.15
    cash_flow: 0.15

composite:
  # Final-score weights. Fundamentals dominate; sentiment is influential but
  # capped. risk_penalty is subtracted.
  weights:
    fundamentals: 0.50
    growth: 0.15
    quality: 0.10
    valuation: 0.10
    sentiment: 0.15
    risk: 0.20                # subtracted

  # Flag thresholds (all on 0..100 scale).
  speculative_hype:
    sentiment_min: 65
    fundamentals_max: 40
  strong_fundamentals_bad_sentiment:
    fundamentals_min: 65
    sentiment_max: 35

logging:
  level: INFO
  log_to_file: false
  file: logs/asset_selection.log
