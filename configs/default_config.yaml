# Asset Selection — default configuration
# All weights, thresholds, and provider choices live here so the pipeline
# stays declarative and reproducible.

run:
  # Mode controls how the universe is built:
  #   full   -> use the entire cleaned U.S. universe; reduce via the staged
  #             funnel below (pipeline.*_top_k). No silent alphabetical cap.
  #   sample -> honour `sample_limit` (or CLI --limit) for a fast test run.
  #   custom -> the universe comes from the CLI's `--tickers` flag.
  mode: full
  # Only used in sample mode. Override on the CLI with `--limit N`.
  sample_limit: null
  # Number of top-ranked tickers written to the Markdown report.
  top_n: 25
  # Where the pipeline writes its CSV/JSON/MD outputs.
  output_dir: reports
  processed_dir: data/processed

# Staged-funnel limits. Set any value to null to skip that stage's cap.
# A full-universe run typically goes 4700 -> 500 -> 150 -> rank.
pipeline:
  # Hard cap on the cleaned stage-1 universe. Null = keep everything.
  universe_max: null
  # Tickers kept after the cheap price/liquidity prescreen.
  after_prices_top_k: 500
  # Tickers kept after the fundamental prescreen. News/sentiment runs only
  # on this set, which is what makes the pipeline compatible with the free
  # yfinance news endpoint at scale.
  after_fundamentals_top_k: 150
  # Drop tickers whose lookback price history is shorter than this.
  min_price_history_days: 30

universe:
  # Primary source -> first fallback -> second fallback.
  sources: [nasdaq_trader, sec_company_tickers]
  # Exchange whitelist. Empty list keeps every exchange present in the
  # source files (NASDAQ + NYSE + NYSE American + NYSE Arca + BATS + IEX).
  # Recognised aliases: AMEX <-> NYSE American; ARCA <-> NYSE Arca; CBOE <-> BATS.
  exchanges: []
  # Asset-type inclusion. Defaults exclude fund-like and non-common-stock
  # instruments. Flip any to true to widen the universe.
  include_etfs: false
  include_funds: false
  include_warrants: false
  include_units: false
  include_preferred: false
  include_rights: false
  include_test_issues: false
  include_notes: false
  # "When-Issued" (WI) / temporary conditional instruments. Their price
  # history is short and not comparable to seasoned common stock, so they are
  # excluded by default. (This is what kept SNDK/CEG When-Issued lines out.)
  include_when_issued: false
  # Minimum length of ticker symbol (filters out obvious garbage).
  min_ticker_length: 1
  max_ticker_length: 5

providers:
  fundamentals: yfinance      # yfinance | finnhub (future) | fmp (future)
  prices: yfinance            # yfinance | stooq | alphavantage (future)
  news: yfinance              # yfinance | newsapi (future) | marketaux (future)

# Backup-plan ladder + provider-fallback + coverage gating policy.
# The pipeline tries primary -> secondary provider(s) live (Plan A/B), then a
# fresh-enough cache (Plan C), then a diagnostic-only result (Plan D) instead of
# a misleading ranking. Coverage thresholds decide whether the final ranking is
# presented as VALID, PARTIAL (with warnings), or DIAGNOSTIC_ONLY.
robustness:
  # --- Backup-plan ladder ---
  # Plan C: when every live provider fails for a ticker, may we serve a
  # recent-but-expired cache entry (labeled "stale_cache")? Off by default so a
  # run never silently passes stale data off as live.
  use_cache_on_provider_failure: false
  # How old (days) a cache entry may be and still back a failed live fetch.
  max_cache_age_days: 7
  # Allow stale cache to back a *diagnostic* run even when not used live.
  allow_stale_cache_for_diagnostic: true
  # Ordered provider names per data type (first = primary, rest = fallbacks).
  # Empty -> use the single providers.<type> above. Example:
  #   provider_priority_by_data_type:
  #     prices: [yfinance, stooq]
  provider_priority_by_data_type: {}
  # If benchmark health shows a systemic provider failure, refuse to present a
  # normal ranking (the run is marked INVALID_PROVIDER_FAILURE).
  stop_on_systemic_provider_failure: true
  # Allow a degraded-but-usable run to be presented as a PARTIAL ranking (with
  # warnings) instead of being blocked outright.
  allow_partial_ranking: true

  # --- Coverage thresholds (consumed by the coverage-validation layer) ---
  # Minimum fraction of priced / fundamentals / news coverage required before
  # the ranking is trusted. News coverage never blocks a run; it only downgrades
  # sentiment confidence.
  min_price_coverage_ratio: 0.60
  min_fundamentals_coverage_ratio: 0.50
  min_news_coverage_ratio: 0.10
  # If provider-side failures exceed this fraction of attempts, treat as a
  # systemic outage.
  max_provider_failure_ratio: 0.50
  # Fewest valid candidates required to present a real ranking.
  min_valid_candidates_for_ranking: 1
  # Minimum benchmark price-health success ratio to run the full pipeline.
  min_benchmark_price_health_ratio: 0.50

# Material / "critical" tickers -- names whose silent disappearance from a
# ranking is a data-quality red flag, not an economic signal. When a critical
# ticker's price endpoint fails, Stage 2 runs the full symbol ladder and a
# cross-provider fundamentals confirmation before classifying it, and the
# validation layer reports the gap LOUDLY (materiality) instead of letting 99.8%
# headline coverage bury a missing NVDA. Nothing here forces a name *into* the
# ranking -- it only governs how hard we try and how visibly a failure is shown.
critical_tickers:
  # Always-critical set (canonical spellings; class shares dotted, e.g. BRK.B).
  static_tickers: [AAPL, MSFT, GOOGL, GOOG, NVDA, AMZN, META, BRK.B, TSLA]
  # Names you explicitly watch (treated as critical + reported under
  # failed_user_watchlist_tickers when they go missing).
  user_watchlist: []
  # Treat the benchmark health bellwethers as critical too.
  treat_benchmark_as_critical: true
  # Dynamic criticality: a priced name at/above this dollar volume is material
  # even if not in the static set; a fundamentals market-cap at/above the cap
  # threshold marks a dynamic large-cap (applied at the validation layer).
  high_dollar_volume_for_critical: 50000000.0
  large_cap_for_critical: 10000000000.0
  # Run the Stage-2 recovery (full symbol ladder + cross-provider fundamentals
  # confirmation) for failed critical tickers before classifying the gap.
  enable_stage2_recovery: true

cache:
  enabled: true
  dir: data/cache
  # Per-provider TTL in seconds. Fundamentals change slowly; news changes fast.
  ttl_seconds:
    fundamentals: 86400       # 24h
    prices: 43200             # 12h
    news: 3600                # 1h
    universe: 604800          # 7d

rate_limits:
  # Minimum seconds between calls per provider, to be polite with free APIs.
  yfinance: 0.4

prices:
  lookback_days: 90
  # Liquidity filter: minimum 20-day average dollar volume.
  min_avg_dollar_volume: 1000000
  # Minimum market cap in USD (penny-stock filter).
  min_market_cap: 100000000
  # Momentum / trend handling within the risk model.
  # If return_pct over the lookback is below this threshold, the ticker is
  # marked with WEAK_PRICE_TREND and given a fixed price-trend penalty.
  weak_return_threshold: -0.10
  # Strength of the cross-sectional momentum penalty (0..100 contribution).
  momentum_penalty_strength: 20.0

sentiment:
  model: vader                # vader | finbert | comparison
  # Run VADER + FinBERT side by side regardless of `model` (reports disagreement).
  compare_models: false
  comparison_models:
    - vader
    - finbert
  # FinBERT is OPTIONAL. It is never fabricated: if the [finbert] extras
  # (transformers + torch) are missing, or the model can't load, the run
  # degrades to VADER and says so via FINBERT_UNAVAILABLE / VADER_ONLY_SENTIMENT.
  finbert_enabled: false
  finbert_model_name: ProsusAI/finbert
  fallback_to_vader_if_finbert_unavailable: true
  # In comparison mode, which score feeds the composite: vader | finbert | ensemble.
  final_sentiment_source: vader
  ensemble_vader_weight: 0.5
  ensemble_finbert_weight: 0.5
  # Ticker-level |vader - finbert| (0..100) above this -> SENTIMENT_MODEL_DISAGREEMENT.
  sentiment_disagreement_threshold: 25.0
  # Mean per-article FinBERT confidence below this -> LOW_FINBERT_CONFIDENCE.
  low_finbert_confidence_threshold: 0.30
  # Articles older than this are ignored.
  max_age_days: 30
  # Exponential half-life (in days) for recency weighting.
  recency_halflife_days: 7
  # Minimum number of articles before sentiment is considered confident.
  min_articles_for_confidence: 3
  # Confidence below this fires the LOW_SENTIMENT_CONFIDENCE flag (0..1).
  low_confidence_threshold: 0.3
  # Confidence model (see SentimentConfig). The old model saturated at 3
  # articles, so the common yfinance case (10 near-duplicate headlines from a
  # single wire) reported confidence 1.0. The new model needs many UNIQUE
  # articles from DIVERSE sources, recent and de-duplicated, to approach 1.0.
  # Unique articles needed to saturate the count factor (10 != full confidence).
  confidence_full_article_count: 25
  # Distinct sources needed to saturate the diversity factor.
  confidence_full_source_count: 5
  # Articles older than this (days) count as "stale" and lower confidence.
  stale_after_days: 14
  # Per-model confidence ceilings: a lexicon model can't be as sure as FinBERT.
  vader_confidence_factor: 0.85
  finbert_confidence_factor: 1.0
  # Confidence-adjusted sentiment fed into the composite. When true, the score
  # uses effective_sentiment = neutral + confidence * (raw - neutral), so a
  # low-confidence sentiment is pulled toward neutral instead of swinging the
  # final_score. raw_sentiment_score is still reported for transparency.
  use_confidence_adjusted_sentiment: true
  neutral_sentiment_score: 50.0
  # Stale-news handling: a low fresh_ratio damps the effective confidence and
  # raises STALE_NEWS / VERY_STALE_NEWS flags.
  stale_news_penalty_enabled: true
  stale_news_fresh_ratio_threshold: 0.50
  very_stale_news_fresh_ratio_threshold: 0.20
  # Distinct non-duplicate sources below this fires LOW_SOURCE_DIVERSITY.
  low_source_diversity_threshold: 2

scoring:
  # Winsorize each metric at these percentiles before z-scoring.
  winsor_lower_pct: 0.02
  winsor_upper_pct: 0.98
  # Missing-data penalty as a fraction of the pillar score (per missing field).
  missing_penalty_per_field: 0.05

  # Per-pillar metric weights. Within a pillar, weights are renormalized over
  # whichever metrics are non-missing for the given ticker.
  growth:
    revenue_growth: 0.35
    earnings_growth: 0.35
    fcf_growth: 0.30
  quality:
    roe: 0.30
    roa: 0.20
    operating_margin: 0.25
    net_margin: 0.25
  valuation:
    # Lower is better for these; the scorer inverts internally.
    pe_ratio: 0.30
    forward_pe: 0.25
    peg_ratio: 0.20
    price_to_sales: 0.15
    price_to_book: 0.10
  balance_sheet:
    debt_to_equity: 0.60      # inverted (less is better)
    current_ratio: 0.40
  cash_flow:
    free_cash_flow_yield: 0.60
    operating_cash_flow_margin: 0.40

  # Pillar weights inside the fundamentals_score aggregator.
  pillars:
    growth: 0.25
    quality: 0.25
    valuation: 0.20
    balance_sheet: 0.15
    cash_flow: 0.15

composite:
  # Final-score weights. Fundamentals dominate; sentiment is influential but
  # capped. risk_penalty is subtracted.
  weights:
    fundamentals: 0.50
    growth: 0.15
    quality: 0.10
    valuation: 0.10
    sentiment: 0.15
    risk: 0.20                # subtracted

  # Flag thresholds (all on 0..100 scale).
  speculative_hype:
    sentiment_min: 65
    fundamentals_max: 40
  strong_fundamentals_bad_sentiment:
    fundamentals_min: 65
    sentiment_max: 35

# Risk-control thresholds. These do NOT remove candidates -- they drive the
# HIGH_VOLATILITY / SPECULATIVE_MOMENTUM flags and the selection_bucket label
# so a steady compounder is visibly separated from a 100%-vol momentum name.
# Volatility values are annualized fractions (0.80 == 80%).
risk_controls:
  max_volatility_pct: 0.80        # above -> HIGH_VOLATILITY + speculative bucket
  max_risk_penalty: 50.0          # above -> speculative bucket
  speculative_return_pct: 0.50    # return gate for SPECULATIVE_MOMENTUM
  speculative_volatility_pct: 0.60  # vol gate for SPECULATIVE_MOMENTUM
  core_min_fundamentals: 58.0     # high_quality_core needs at least this
  core_max_volatility_pct: 0.45   # ...and vol no higher than this
  core_max_risk_penalty: 12.0     # ...and risk_penalty no higher than this
  watchlist_max_fundamentals: 50.0  # below this (if not speculative) -> watchlist

# Allocation-eligibility gates. These separate the RESEARCH RANKING (every
# scored candidate, sorted by final_score) from the ALLOCATION SHORTLIST (the
# subset safe to hand to a future allocation/rebalancing module). Nothing here
# removes a candidate from the research ranking -- it only sets
# `eligible_for_allocation` and the `allocation_adjusted_score`.
allocation:
  # Buckets that are never eligible by default (flip to true to override).
  allow_speculative_for_allocation: false
  allow_watchlist_for_allocation: false
  # Risk gates (annualized vol fraction; risk_penalty on 0..100).
  max_allocation_volatility: 0.50
  max_allocation_risk_penalty: 25.0
  require_non_negative_recent_return_for_allocation: true
  # Data-quality gates.
  max_missing_metric_count_for_allocation: 4
  require_market_cap_for_allocation: true
  # Sentiment gates (only applied when the name actually has news).
  min_sentiment_confidence_for_allocation: 0.30
  min_fresh_news_ratio_for_allocation: 0.50
  # allocation_adjusted_score penalties (subtracted from final_score, 0..100).
  penalty_high_volatility: 25.0
  penalty_speculative_momentum: 20.0
  penalty_weak_price_trend: 15.0
  penalty_watchlist_bucket: 20.0
  penalty_speculative_bucket: 15.0
  penalty_low_sentiment_confidence: 10.0
  penalty_stale_news: 10.0
  penalty_excess_risk_weight: 0.5

logging:
  level: INFO
  log_to_file: false
  file: logs/asset_selection.log
